<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌸 イベント受付 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:   #FF6B9D;
      --purple: #C084FC;
      --yellow: #FBD97C;
      --mint:   #6EE7B7;
      --blue:   #60A5FA;
      --dark:   #3D2C8D;
      --mid:    #7C3AED;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #FFE8F3 0%, #EDE9FF 50%, #E8F3FF 100%);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* floating blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #FF6B9D, transparent 70%);
      top: -120px; left: -120px;
      animation: blob1 18s ease-in-out infinite alternate;
    }
    body::after {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #C084FC, transparent 70%);
      bottom: -150px; right: -150px;
      animation: blob2 22s ease-in-out infinite alternate;
    }
    @keyframes blob1 { to { transform: translate(80px, 60px); } }
    @keyframes blob2 { to { transform: translate(-80px, -60px); } }

    .wrap {
      position: relative; z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      padding: 40px 20px 24px;
      position: relative;
    }
    .header-icon {
      font-size: 3rem;
      display: inline-block;
      animation: bounce 2.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: .04em;
      background: linear-gradient(135deg, #FF6B9D 0%, #C084FC 50%, #60A5FA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 8px 0 6px;
    }
    .subtitle {
      font-size: .92rem;
      color: var(--mid);
      font-weight: 500;
    }
    .deco { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .deco span { position: absolute; font-size: 1.4rem; animation: twinkle 2.5s ease-in-out infinite; }
    .deco span:nth-child(1) { top:12%; left:4%;  animation-delay:0s;   font-size:1.6rem; }
    .deco span:nth-child(2) { top:8%;  right:5%; animation-delay:.6s;  font-size:1.2rem; }
    .deco span:nth-child(3) { top:55%; left:2%;  animation-delay:1.2s; font-size:1rem;   }
    .deco span:nth-child(4) { top:40%; right:3%; animation-delay:1.8s; font-size:1.8rem; }
    .deco span:nth-child(5) { top:75%; left:5%;  animation-delay:.9s;  font-size:1.1rem; }
    .deco span:nth-child(6) { top:68%; right:4%; animation-delay:2.1s; font-size:1.3rem; }
    @keyframes twinkle {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    /* ─── Glass card ─── */
    .card {
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 40px rgba(192,132,252,.18);
      padding: 28px 24px;
      margin-bottom: 20px;
    }

    /* ─── PIN エントリー ─── */
    .pin-label {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--mid);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* PIN ディスプレイ（入力された桁を表示） */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 52px; height: 60px;
      border-radius: 14px;
      border: 2.5px solid rgba(192,132,252,.35);
      background: rgba(255,255,255,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--dark);
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .pin-dot.active {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(192,132,252,.25);
      transform: scale(1.06);
    }
    .pin-dot.filled {
      background: linear-gradient(135deg, rgba(192,132,252,.12), rgba(255,107,157,.12));
      border-color: var(--purple);
    }

    /* テンキー */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }
    .key {
      aspect-ratio: 1;
      border-radius: 18px;
      border: none;
      font-size: 1.5rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { transform: scale(.88); }

    .key-num {
      background: rgba(255,255,255,.95);
      color: var(--dark);
      box-shadow: 0 4px 14px rgba(192,132,252,.15);
    }
    .key-num:hover { box-shadow: 0 6px 20px rgba(192,132,252,.28); transform: translateY(-2px); }

    .key-clear {
      background: linear-gradient(135deg, #FCE4EC, #F8BBD9);
      color: #C2185B;
      box-shadow: 0 4px 14px rgba(194,24,91,.12);
      font-size: 1.8rem;
    }
    .key-enter {
      background: linear-gradient(135deg, #FF6B9D, #C084FC);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255,107,157,.4);
      font-size: 1.5rem;
    }
    .key-enter:hover { box-shadow: 0 8px 28px rgba(255,107,157,.5); transform: translateY(-2px); }
    .key-enter:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .key-empty { background: transparent; cursor: default; box-shadow: none; }
    .key-empty:active { transform: none; }

    .hint {
      text-align: center;
      font-size: .78rem;
      color: #B89FE8;
      margin-top: 16px;
    }

    /* ─── Setup notice ─── */
    .notice {
      background: rgba(251,217,124,.22);
      border: 2px solid rgba(251,217,124,.7);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 18px;
      font-size: .85rem;
      color: #92400E;
      line-height: 1.6;
    }
    .notice strong { display: block; margin-bottom: 4px; }
    code { background: rgba(0,0,0,.07); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: .88em; }

    /* ─── Loading ─── */
    .loading { display: flex; justify-content: center; padding: 40px 0; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(192,132,252,.3);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Result card ─── */
    .result-card {
      background: rgba(255,255,255,.92);
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 40px rgba(192,132,252,.2);
      padding: 24px 20px 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: slideUp .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 5px; height: 100%;
      background: linear-gradient(180deg, #FF6B9D, #C084FC);
    }
    .result-card.done::before { background: linear-gradient(180deg, #6EE7B7, #3B82F6); }
    .result-card.done { background: rgba(240,253,244,.95); }

    .pin-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, rgba(192,132,252,.15), rgba(255,107,157,.15));
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .8rem;
      font-weight: 700;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .name-kana  { font-size: 1.35rem; font-weight: 700; letter-spacing: .08em; }
    .name-kanji { font-size: .98rem; color: #9F7AEA; margin-top: 4px; font-weight: 500; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }
    .info-box { background: linear-gradient(135deg, rgba(192,132,252,.1), rgba(255,107,157,.1)); border-radius: 12px; padding: 10px 14px; }
    .info-lbl { font-size: .72rem; color: #9F7AEA; font-weight: 700; letter-spacing: .05em; margin-bottom: 3px; }
    .info-val  { font-size: 1.45rem; font-weight: 700; color: var(--dark); }
    .info-val .u { font-size: .88rem; font-weight: 500; color: #9F7AEA; }

    /* ─── Check-in section ─── */
    .ci-section { border-top: 2px dashed rgba(192,132,252,.3); padding-top: 16px; }
    .ci-lbl { font-size: .85rem; font-weight: 700; color: var(--mid); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .ci-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .cnt-btn {
      width: 46px; height: 46px;
      border-radius: 12px; border: none;
      font-size: 1.5rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      transition: transform .15s;
    }
    .cnt-btn:hover  { transform: scale(1.12); }
    .cnt-btn:active { transform: scale(.92); }
    .cnt-btn.minus { background: linear-gradient(135deg, #FCE4EC, #F8BBD9); color: #C2185B; }
    .cnt-btn.plus  { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); color: #2E7D32; }
    .ci-input {
      flex: 1; min-width: 0;
      padding: 12px 10px;
      font-size: 1.3rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      text-align: center;
      border: 2px solid rgba(192,132,252,.3);
      border-radius: 12px;
      background: #fff;
      color: var(--dark);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .ci-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(192,132,252,.2); }

    .ci-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6EE7B7, #60A5FA);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s, opacity .2s;
      box-shadow: 0 4px 16px rgba(96,165,250,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .ci-btn:hover   { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(96,165,250,.45); }
    .ci-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .ci-btn.done    { background: linear-gradient(135deg, #6EE7B7, #22C55E); }

    /* もう一度ボタン */
    .retry-btn {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: rgba(255,255,255,.8);
      color: var(--mid);
      border: 2px solid rgba(192,132,252,.35);
      border-radius: 14px;
      font-size: .95rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .retry-btn:hover { background: rgba(255,255,255,1); border-color: var(--purple); }

    /* ─── Error state ─── */
    .error-card {
      text-align: center;
      padding: 36px 20px;
      animation: slideUp .3s ease;
    }
    .error-icon { font-size: 3rem; display: block; margin-bottom: 14px; }
    .error-text { font-size: 1.05rem; color: var(--mid); font-weight: 600; line-height: 1.7; margin-bottom: 20px; }

    /* ─── Confetti ─── */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
    .conf { position: absolute; width: 10px; height: 14px; border-radius: 2px; opacity: 0; animation: confFall 1.6s ease-in forwards; }
    @keyframes confFall {
      0%   { opacity:1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: linear-gradient(135deg, #6EE7B7, #60A5FA);
      color: #fff;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 700; font-size: .95rem;
      box-shadow: 0 8px 32px rgba(96,165,250,.4);
      transition: transform .5s cubic-bezier(.34,1.56,.64,1);
      z-index: 10000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <div class="deco" aria-hidden="true">
      <span>⭐</span><span>✨</span><span>🌟</span>
      <span>⭐</span><span>✨</span><span>🌟</span>
    </div>
    <span class="header-icon">🌸</span>
    <h1 id="js-title">イベント受付</h1>
    <p class="subtitle" id="js-subtitle">招待状のPINを入力してください 🎟️</p>
  </header>

  <!-- Setup notice -->
  <div id="js-notice" class="notice" style="display:none">
    <strong>⚙️ 設定が必要です</strong>
    index.html の <code>GAS_URL</code> に Google Apps Script の Web アプリ URL を設定してください。<br>
    設定完了まではデモデータで動作します。
  </div>

  <!-- PIN入力 -->
  <div class="card" id="js-pin-card">
    <div class="pin-label">
      🎟️ 招待状に記載のPINを入力してください
    </div>

    <!-- PIN表示エリア（桁数に応じて自動生成） -->
    <div class="pin-display" id="js-pin-display"></div>

    <!-- テンキー -->
    <div class="keypad">
      <button class="key key-num" onclick="pressKey('1')">1</button>
      <button class="key key-num" onclick="pressKey('2')">2</button>
      <button class="key key-num" onclick="pressKey('3')">3</button>
      <button class="key key-num" onclick="pressKey('4')">4</button>
      <button class="key key-num" onclick="pressKey('5')">5</button>
      <button class="key key-num" onclick="pressKey('6')">6</button>
      <button class="key key-num" onclick="pressKey('7')">7</button>
      <button class="key key-num" onclick="pressKey('8')">8</button>
      <button class="key key-num" onclick="pressKey('9')">9</button>
      <button class="key key-clear" onclick="clearPin()" title="クリア">⌫</button>
      <button class="key key-num" onclick="pressKey('0')">0</button>
      <button class="key key-enter" id="js-enter-key" onclick="submitPin()" disabled title="確認">✓</button>
    </div>

    <p class="hint" id="js-hint">招待状に記載された数字を入力してください</p>
  </div>

  <!-- 結果エリア -->
  <div id="js-results"></div>

</div>

<div id="js-toast" class="toast"></div>
<div class="confetti-wrap" id="js-confetti" aria-hidden="true"></div>

<script>
  // ================================================================
  //  設定 — ここを編集してください
  // ================================================================
  const GAS_URL        = 'YOUR_GAS_URL_HERE';
  const EVENT_TITLE    = 'イベント受付';
  const EVENT_SUBTITLE = '招待状のPINを入力してください 🎟️';
  const PIN_DIGITS     = 4;   // PINの桁数（スプレッドシートに合わせてください）
  // ================================================================

  document.getElementById('js-title').textContent    = EVENT_TITLE;
  document.getElementById('js-subtitle').textContent = EVENT_SUBTITLE;
  document.title = '🌸 ' + EVENT_TITLE + ' 🌸';

  if (GAS_URL === 'YOUR_GAS_URL_HERE') {
    document.getElementById('js-notice').style.display = 'block';
  }

  // ── PIN state ──────────────────────────────────────────────────
  let pinValue = '';

  // PINドット初期化
  function initPinDisplay() {
    const disp = document.getElementById('js-pin-display');
    disp.innerHTML = '';
    for (let i = 0; i < PIN_DIGITS; i++) {
      const dot = document.createElement('div');
      dot.className = 'pin-dot';
      dot.id = 'dot-' + i;
      disp.appendChild(dot);
    }
  }
  initPinDisplay();

  function updateDisplay() {
    for (let i = 0; i < PIN_DIGITS; i++) {
      const dot = document.getElementById('dot-' + i);
      if (i < pinValue.length) {
        dot.textContent = pinValue[i];
        dot.classList.add('filled');
        dot.classList.remove('active');
      } else if (i === pinValue.length) {
        dot.textContent = '';
        dot.classList.add('active');
        dot.classList.remove('filled');
      } else {
        dot.textContent = '';
        dot.classList.remove('filled', 'active');
      }
    }
    document.getElementById('js-enter-key').disabled = (pinValue.length !== PIN_DIGITS);
  }

  function pressKey(digit) {
    if (pinValue.length >= PIN_DIGITS) return;
    pinValue += digit;
    updateDisplay();
    if (pinValue.length === PIN_DIGITS) submitPin();
  }

  function clearPin() {
    pinValue = pinValue.slice(0, -1);
    updateDisplay();
  }

  // ── DEMO DATA ──────────────────────────────────────────────────
  const DEMO = [
    { rowIndex:2, pin:'1001', kana:'タナカ タロウ',    kanji:'田中 太郎',   registeredCount:4, actualCount:'' },
    { rowIndex:3, pin:'1002', kana:'タナカ ハナコ',    kanji:'田中 花子',   registeredCount:2, actualCount:2  },
    { rowIndex:4, pin:'1003', kana:'ヤマダ ケンジ',    kanji:'山田 健二',   registeredCount:3, actualCount:'' },
    { rowIndex:5, pin:'1004', kana:'スズキ ユイ',      kanji:'鈴木 結衣',   registeredCount:5, actualCount:'' },
    { rowIndex:6, pin:'1005', kana:'サトウ ファミリー', kanji:'佐藤 家族',  registeredCount:6, actualCount:6  },
    { rowIndex:7, pin:'1006', kana:'イトウ アキラ',    kanji:'伊藤 明',     registeredCount:2, actualCount:'' },
  ];

  // ── SUBMIT PIN ─────────────────────────────────────────────────
  function submitPin() {
    if (pinValue.length !== PIN_DIGITS) return;
    const entered = pinValue;
    showLoading();

    if (GAS_URL === 'YOUR_GAS_URL_HERE') {
      setTimeout(() => {
        const hit = DEMO.find(d => d.pin === entered);
        renderResult(hit, entered);
      }, 500);
      return;
    }

    jsonp({ action: 'findByPin', pin: entered }, data => {
      if (data.success) renderResult(data.data, entered);
      else showError(entered);
    }, () => showError(entered));
  }

  // ── RECORD ATTENDANCE ──────────────────────────────────────────
  function record(rowIndex) {
    const input = document.getElementById('ci-' + rowIndex);
    const count = parseInt(input.value);
    if (isNaN(count) || count < 0) { alert('正しい人数を入力してください'); return; }

    const btn = document.getElementById('btn-' + rowIndex);
    btn.disabled = true;
    btn.innerHTML = '⏳ 記録中…';

    const done = () => {
      updateCardDone(rowIndex, count);
      showToast('🎉 入場を記録しました！');
      fireConfetti();
    };

    if (GAS_URL === 'YOUR_GAS_URL_HERE') { setTimeout(done, 600); return; }

    jsonp({ action: 'update', row: rowIndex, count }, data => {
      if (data.success) done();
      else {
        btn.disabled = false;
        btn.innerHTML = '❌ エラー — 再試行';
        showToast('❌ エラーが発生しました');
      }
    }, () => {
      btn.disabled = false;
      btn.innerHTML = '❌ 接続エラー — 再試行';
    });
  }

  function changeCount(rowIndex, delta) {
    const el = document.getElementById('ci-' + rowIndex);
    el.value = Math.max(0, (parseInt(el.value) || 0) + delta);
  }

  // ── RENDER ─────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById('js-results').innerHTML =
      '<div class="loading"><div class="spinner"></div></div>';
  }

  function renderResult(person, enteredPin) {
    const box = document.getElementById('js-results');

    if (!person) {
      box.innerHTML = `
        <div class="card error-card">
          <span class="error-icon">🔍</span>
          <div class="error-text">
            PIN「<strong>${esc(enteredPin)}</strong>」は見つかりませんでした<br>
            招待状をご確認ください
          </div>
          <button class="retry-btn" onclick="resetPin()">🔄 もう一度入力する</button>
        </div>`;
      resetPinInput();
      return;
    }

    const done   = person.actualCount !== '' && person.actualCount !== null && person.actualCount !== undefined;
    const defVal = done ? person.actualCount : (person.registeredCount || 0);

    box.innerHTML = `
      <div class="result-card ${done ? 'done' : ''}" id="card-${person.rowIndex}">
        <div class="pin-badge">🎟️ PIN: ${esc(person.pin || enteredPin)}</div>
        <div class="name-kana">${esc(person.kana)}</div>
        <div class="name-kanji">📝 ${esc(person.kanji)}</div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-lbl">👨‍👩‍👧‍👦 予定人数</div>
            <div class="info-val">${person.registeredCount || 0}<span class="u"> 名</span></div>
          </div>
          <div class="info-box">
            <div class="info-lbl">✅ 入場済</div>
            <div class="info-val" id="done-val-${person.rowIndex}">
              ${done ? person.actualCount + '<span class="u"> 名</span>' : '<span style="color:#C4B5E8">—</span>'}
            </div>
          </div>
        </div>

        <div class="ci-section">
          <div class="ci-lbl">🎟️ 実際の入場人数を入力してください</div>
          <div class="ci-row">
            <button class="cnt-btn minus" onclick="changeCount(${person.rowIndex},-1)">－</button>
            <input class="ci-input" id="ci-${person.rowIndex}" type="number"
                   min="0" max="99" value="${defVal}" inputmode="numeric">
            <button class="cnt-btn plus"  onclick="changeCount(${person.rowIndex}, 1)">＋</button>
          </div>
          <button class="ci-btn ${done ? 'done' : ''}" id="btn-${person.rowIndex}"
                  onclick="record(${person.rowIndex})">
            ${done ? '✅ 入場済み（再登録する）' : '🎉 入場を記録する'}
          </button>
        </div>
      </div>
      <button class="retry-btn" onclick="resetPin()">🔄 別の方の受付をする</button>`;

    resetPinInput();
  }

  function showError(enteredPin) {
    renderResult(null, enteredPin);
  }

  function resetPin() {
    pinValue = '';
    updateDisplay();
    document.getElementById('js-results').innerHTML = '';
  }

  function resetPinInput() {
    pinValue = '';
    updateDisplay();
  }

  function updateCardDone(rowIndex, count) {
    const card = document.getElementById('card-' + rowIndex);
    const val  = document.getElementById('done-val-' + rowIndex);
    const btn  = document.getElementById('btn-' + rowIndex);
    if (card) card.classList.add('done');
    if (val)  val.innerHTML = count + '<span class="u"> 名</span>';
    if (btn)  { btn.disabled = false; btn.classList.add('done'); btn.innerHTML = '✅ 入場済み（再登録する）'; }
  }

  // ── JSONP ──────────────────────────────────────────────────────
  function jsonp(params, onSuccess, onError) {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const sc = document.createElement('script');
    sc.src = GAS_URL + '?' + new URLSearchParams({ ...params, callback: cbName }).toString();
    window[cbName] = data => { delete window[cbName]; sc.remove(); onSuccess(data); };
    sc.onerror = () => { delete window[cbName]; sc.remove(); if (onError) onError(); };
    document.body.appendChild(sc);
  }

  // ── CONFETTI ───────────────────────────────────────────────────
  const CONF_COLORS = ['#FF6B9D','#C084FC','#FBD97C','#6EE7B7','#60A5FA','#FF9B50'];
  function fireConfetti() {
    const wrap = document.getElementById('js-confetti');
    wrap.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'conf';
      el.style.cssText = `left:${Math.random()*100}%;background:${CONF_COLORS[Math.random()*CONF_COLORS.length|0]};animation-delay:${Math.random()*.6}s;animation-duration:${1.2+Math.random()*.8}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
      wrap.appendChild(el);
    }
    setTimeout(() => wrap.innerHTML = '', 2800);
  }

  // ── TOAST ──────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('js-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
